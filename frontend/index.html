<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Awesome Student Manager</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay">

<div class="container">

<h1>Awesome Student Manager</h1>

<div class="form">

<input
type="text"
id="studentId"
placeholder="Student ID">

<input
type="text"
id="studentName"
placeholder="Student Name">

<button onclick="saveStudent()">

Save Student

</button>

</div>

<h2>Students</h2>

<table>

<thead>

<tr>

<th>Student ID</th>

<th>Student Name</th>

</tr>

</thead>

<tbody id="studentTableBody">

</tbody>

</table>

</div>

</div>

<script src="config.js"></script>

<script src="script.js"></script>

</body>

</html>
